<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shanazar Terminal: Third Build</title>
    <script>
        const baseTitle = "Shanazar Terminal: Third Build";
        let blink = true;
        
        setInterval(() => {
            document.title = blink ? `${baseTitle} ▌` : baseTitle;
            blink = !blink;
        }, 600);
    </script>
   <style>
        :root {
            color-scheme: dark;
            --void: #10091a;
            --panel: #181020;
            --purple: #3b254f;
            --green: #8aa64b;
            --orange: #d66b20;
            --red: #b52132;
            --text: #e8e1d4;
            --muted: #a99db4;
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--void);
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 42px 20px;
            display: grid;
            place-items: center;
            font-family: "Courier New", monospace;
            line-height: 1.55;
            color: var(--text);
            background: transparent;
        }

        main {
            width: min(620px, 100%);
            border: 1px solid var(--green);
            background: var(--panel);
            position: relative;
        }

        main::before,
        main::after {
            content: "";
            position: absolute;
            width: 34px;
            height: 34px;
            border-color: var(--orange);
            border-style: solid;
            pointer-events: none;
        }

        main::before {
            top: -1px;
            left: -1px;
            border-width: 3px 0 0 3px;
        }

        main::after {
            right: -1px;
            bottom: -1px;
            border-width: 0 3px 3px 0;
        }

        .signal {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
            border-bottom: 1px solid var(--green);
            padding: 12px 14px;
            color: var(--green);
            text-transform: uppercase;
            letter-spacing: 0;
            font-size: 0.76rem;
        }

        .status {
            color: var(--orange);
        }

        .content {
            padding: 30px 24px 26px;
        }

        h1 {
            margin: 0 0 10px;
            max-width: 11ch;
            font-size: clamp(2rem, 8vw, 4rem);
            line-height: 1;
            letter-spacing: 0;
            color: var(--text);
            text-transform: uppercase;
            text-shadow: 3px 3px 0 var(--purple);
        }

        .subtitle {
            margin: 0 0 26px;
            color: var(--orange);
            font-size: 1rem;
            text-transform: uppercase;
        }

        .bio {
            max-width: 58ch;
            margin: 0 0 14px;
            color: var(--muted);
        }

        .stack {
            display: inline-block;
            margin: 16px 0 26px;
            padding: 6px 10px;
            border-left: 3px solid var(--orange);
            background: #21152b;
            color: var(--text);
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        a {
            min-width: 92px;
            padding: 8px 10px;
            border: 1px solid var(--green);
            color: var(--green);
            background: transparent;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
        }

        a:hover,
        a:focus-visible {
            color: var(--void);
            background: var(--green);
            outline: none;
        }

        @media (max-width: 540px) {
            body {
                padding: 20px 14px;
            }

            .signal {
                grid-template-columns: 1fr;
                gap: 4px;
            }

            .content {
                padding: 30px 20px 24px;
            }

            a {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>
    <main aria-label="profile">
        <div class="signal">
            <span>MAGI access node / personal interface</span>
            <span class="status">sync ratio 100%</span>
        </div>
        <section class="content">
            <h1>Shanazar Nizamaddinov</h1>
            <p class="subtitle">Terminal Impact Engineer</p>
            <p class="bio">Computer engineer focusing on backend architecture, systems, and terminal-based workflows.</p>
            <p class="stack">stack: php (symfony), python (django), mysql, mongodb, docker</p>
            <nav aria-label="links">
                <a href="https://github.com/snizamaddinov" target="_blank" rel="noopener noreferrer">github</a>
                <a href="https://linkedin.com/in/shanazar-nizamaddinov/" target="_blank" rel="noopener noreferrer">linkedin</a>
                <a href="mailto:me@shanazar.com" target="_blank" rel="noopener noreferrer">email</a>
            </nav>
        </section>
    </main>
</body>
</html>
